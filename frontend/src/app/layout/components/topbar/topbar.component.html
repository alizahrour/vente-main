<header class="portal-header" *ngIf="authService.currentUser$ | async as user">
  <a class="portal-brand" routerLink="/customers" aria-label="Accueil portail">
    <span class="logo-mark">
      <span>maroc</span>
      <span>telecom</span>
    </span>
    <strong>Portail Entreprise Unifié</strong>
  </a>

  <div class="portal-session">
    <button class="round-icon" type="button" aria-label="Notifications">
      <span class="bell-icon" aria-hidden="true"></span>
    </button>
    <button class="round-icon" type="button" (click)="logout()" aria-label="Se déconnecter">
      <span class="user-icon" aria-hidden="true"></span>
    </button>
    <span class="session-name">{{ user.username }} / <strong>{{ user.fullName }}</strong></span>
    <button class="apps-icon" type="button" aria-label="Menu applications">
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </button>
  </div>
</header>
